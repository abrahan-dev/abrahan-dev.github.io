<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
    <link
      rel="alternate"
      type="application/rss+xml"
      title="{{ site.title }}"
      href="{{ '/feed.xml' | relative_url }}"
    />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav">
        <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <div class="nav-links">
          <a href="{{ '/archive/' | relative_url }}">Archive</a>
          <a href="{{ '/categories/' | relative_url }}">Categories</a>
          <a href="{{ site.author.linkedin }}" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        </div>
      </nav>
    </header>

    <main class="page">{{ content }}</main>

    <footer class="site-footer">
      <p>Software notes.</p>
    </footer>
    <script src="{{ '/assets/js/code-blocks.js' | relative_url }}"></script>
  </body>
</html>
